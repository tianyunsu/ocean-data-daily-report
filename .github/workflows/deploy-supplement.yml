name: Deploy supplement → gh-pages/supplement/

on:
  push:
    branches:
      - supplement

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout supplement branch
        uses: actions/checkout@v4
        with:
          ref: supplement

      - name: Deploy supplement files to gh-pages/supplement/
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
          destination_dir: supplement
          exclude_assets: >
            .github,
            .codebuddy,
            .workbuddy,
            node_modules,
            __pycache__,
            daily_reports,
            *.py,
            *.js,
            *.json,
            *.bat,
            *.ps1,
            *.vbs,
            *.md,
            *.txt,
            *.pptx,
            *.ppt
          keep_files: true
          commit_message: "deploy supplement: ${{ github.event.head_commit.message }}"
