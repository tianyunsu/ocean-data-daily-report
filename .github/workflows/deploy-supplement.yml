name: Deploy supplement to GitHub Pages

on:
  push:
    branches:
      - supplement

# 允许 Actions 读写仓库内容
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout supplement branch
        uses: actions/checkout@v4
        with:
          ref: supplement
          fetch-depth: 0

      - name: Set up deploy directory
        run: |
          mkdir -p /tmp/deploy/supplement
          # 复制 supplement 网站文件到 /supplement/ 子目录
          cp index.html   /tmp/deploy/supplement/
          cp archive.html /tmp/deploy/supplement/
          cp style.css    /tmp/deploy/supplement/
          cp -r posts/    /tmp/deploy/supplement/posts/

      - name: Also grab main branch site files to root
        run: |
          git fetch origin main
          git checkout origin/main -- index.html archive.html style.css posts/ 2>/dev/null || true
          # 复制 main 网站文件到根目录
          cp index.html   /tmp/deploy/ 2>/dev/null || true
          cp archive.html /tmp/deploy/ 2>/dev/null || true
          cp style.css    /tmp/deploy/ 2>/dev/null || true
          cp -r posts/    /tmp/deploy/posts/ 2>/dev/null || true
          # 恢复 supplement 文件
          git checkout supplement -- index.html archive.html style.css posts/

      - name: Inject cross-link into supplement index.html
        run: |
          # 在 supplement 的 nav 里加上"跳转主站"链接
          sed -i 's|<a href="archive.html">全部归档</a>|<a href="archive.html">全部归档</a>\n      <a href="../" class="cross-link" style="margin-left:16px;color:#ff9800;font-weight:bold;" title="查看另一台电脑的检索结果">⇄ 主站日报</a>|' /tmp/deploy/supplement/index.html
          # 同样处理 archive.html
          sed -i 's|<a href="archive.html">全部归档</a>|<a href="archive.html">全部归档</a>\n      <a href="../" class="cross-link" style="margin-left:16px;color:#ff9800;font-weight:bold;" title="查看另一台电脑的检索结果">⇄ 主站日报</a>|' /tmp/deploy/supplement/archive.html 2>/dev/null || true

      - name: Inject cross-link into main index.html
        run: |
          # 在主站的 nav 里加上"跳转补充站"链接
          sed -i 's|<a href="archive.html">全部归档</a>|<a href="archive.html">全部归档</a>\n      <a href="supplement/" class="cross-link" style="margin-left:16px;color:#ff9800;font-weight:bold;" title="查看另一台电脑的补充检索结果">⇄ 补充日报</a>|' /tmp/deploy/index.html 2>/dev/null || true
          sed -i 's|<a href="archive.html">全部归档</a>|<a href="archive.html">全部归档</a>\n      <a href="supplement/" class="cross-link" style="margin-left:16px;color:#ff9800;font-weight:bold;" title="查看另一台电脑的补充检索结果">⇄ 补充日报</a>|' /tmp/deploy/archive.html 2>/dev/null || true

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: /tmp/deploy
          keep_files: false
          commit_message: "deploy: supplement + main to gh-pages (${{ github.sha }})"
