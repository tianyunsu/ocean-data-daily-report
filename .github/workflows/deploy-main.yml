name: Deploy main → gh-pages/

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Inject "补充日报" link into index.html
        run: |
          sed -i 's|<a href="archive.html">全部归档</a>|<a href="archive.html">全部归档</a>\n      <a href="supplement/" style="margin-left:16px;color:#ff9800;font-weight:bold;border:1px solid #ff9800;padding:2px 10px;border-radius:4px;" title="查看补充日报">⇄ 补充日报</a>|' index.html

      - name: Inject "补充日报" link into archive.html
        run: |
          sed -i 's|<a href="archive.html" class="active">全部归档</a>|<a href="archive.html" class="active">全部归档</a>\n      <a href="supplement/" style="margin-left:16px;color:#ff9800;font-weight:bold;border:1px solid #ff9800;padding:2px 10px;border-radius:4px;" title="查看补充日报">⇄ 补充日报</a>|' archive.html

      - name: Deploy main files to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
          destination_dir: .
          exclude_assets: >
            .github,
            .codebuddy,
            .workbuddy,
            node_modules,
            __pycache__,
            daily_reports,
            *.py,
            *.js,
            *.json,
            *.bat,
            *.ps1,
            *.vbs,
            *.md,
            *.txt,
            *.pptx,
            *.ppt
          keep_files: true
          commit_message: "deploy main: ${{ github.event.head_commit.message }}"
